name: Build Project - WebAssembly

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'resources/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build_wasm.yml'
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write       # Requerido para subir el zip al Release de GitHub
    runs-on: windows-latest

    env:
      PROJECT_NAME: juego_raylib # Fuerza el nombre exacto de tu ejecutable según tu CMakeLists.txt
      PROJECT_RELEASE_PATH: juego_raylib_dev_wasm

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          submodules: recursive # Por si acaso tienes submódulos

      - name: Setup emsdk
        uses: emscripten-core/setup-emsdk@v11
        with:
          version: 3.1.64 # Versión LTS recomendada y super estable para Raylib

      - name: Setup Release Paths (Only on Release)
        run: |
          echo "PROJECT_RELEASE_PATH=${{ env.PROJECT_NAME }}_v${{ github.event.release.tag_name }}_wasm" >> $GITHUB_ENV
        shell: bash
        if: github.event_name == 'release' && github.event.action == 'published'

      - name: Verify EMSDK Context
        run: |
          emcc -v
          echo "EMSDK PATH: $EMSDK"
        shell: bash

      - name: Configure CMake for WebAssembly
        run: |
          cmake -B build -G "MinGW Makefiles" -DCMAKE_TOOLCHAIN_FILE="%EMSDK%/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake" -DPLATFORM_WEB=ON -DEMSCRIPTEN=ON
        shell: cmd

      - name: Build Product
        run: |
          cmake --build build --config Release
        shell: cmd

      - name: Generate Artifacts Directory
        run: |
          mkdir ${{ env.PROJECT_RELEASE_PATH }}
          # Copiamos los archivos generados por Emscripten desde la carpeta build a nuestra carpeta limpia de entrega
          copy /Y build\${{ env.PROJECT_NAME }}.html ${{ env.PROJECT_RELEASE_PATH }}\index.html
          copy /Y build\${{ env.PROJECT_NAME }}.js ${{ env.PROJECT_RELEASE_PATH }}\${{ env.PROJECT_NAME }}.js
          copy /Y build\${{ env.PROJECT_NAME }}.wasm ${{ env.PROJECT_RELEASE_PATH }}\${{ env.PROJECT_NAME }}.wasm
          
          # Copiamos el archivo .data virtual de recursos SOLO si existe (gracias a tu preload-file de CMake)
          if exist build\${{ env.PROJECT_NAME }}.data copy /Y build\${{ env.PROJECT_NAME }}.data ${{ env.PROJECT_RELEASE_PATH }}\${{ env.PROJECT_NAME }}.data
          
          # Documentos base si existieran en la raíz
          if exist README.md copy /Y README.md ${{ env.PROJECT_RELEASE_PATH }}\README.md
          if exist LICENSE copy /Y LICENSE ${{ env.PROJECT_RELEASE_PATH }}\LICENSE
          
          # Comprimir todo en un .zip listo para descargar
          7z a .\${{ env.PROJECT_RELEASE_PATH }}.zip .\${{ env.PROJECT_RELEASE_PATH }}\*
        shell: cmd

      - name: Upload Artifacts to Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_RELEASE_PATH }}
          path: ./${{ env.PROJECT_RELEASE_PATH }}

      - name: Upload Artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./${{ env.PROJECT_RELEASE_PATH }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name == 'release' && github.event.action == 'published'